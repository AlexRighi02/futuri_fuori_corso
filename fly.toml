# fly.toml per l'app Futuri Fuori Corso
# Docs: https://fly.io/docs/reference/configuration/

app = "futuri-fuori-corso"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"       # spegne la VM quando non ci sono richieste
  auto_start_machines = true        # la riaccende al primo traffico
  min_machines_running = 0          # nessuna macchina sempre attiva (riduce i costi)
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [http_service.health_check]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"                # aggiungi un endpoint semplice in Flask per la salute

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024                  # 1 GB RAM → sufficiente per Playwright
